name: Codex Aide Dev Validation

on:
  pull_request:
  push:

jobs:
  validate-codex-aide-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run codex-aide development validation
        run: node scripts/validate-codex-aide-dev.mjs full
